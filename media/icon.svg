<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e639c"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="6" y="6" width="116" height="116" rx="20" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Neural network dots -->
  <circle cx="22" cy="22" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="106" cy="22" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="22" cy="106" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="106" cy="106" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="64" cy="16" r="2.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="64" cy="112" r="2.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="16" cy="64" r="2.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="112" cy="64" r="2.5" fill="rgba(255,255,255,0.2)"/>

  <!-- Connecting lines -->
  <line x1="22" y1="22" x2="64" y2="16" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="106" y1="22" x2="64" y2="16" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="22" y1="106" x2="64" y2="112" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="106" y1="106" x2="64" y2="112" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="22" y1="22" x2="16" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="22" y1="106" x2="16" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="106" y1="22" x2="112" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="106" y1="106" x2="112" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Big T letter -->
  <text x="64" y="84" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="url(#glow)" opacity="0.95">T</text>

  <!-- AI label -->
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.6)" letter-spacing="3">AI</text>
</svg>
